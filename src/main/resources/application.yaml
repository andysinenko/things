spring:
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: stage
  docker:
    compose:
      profiles:
        active: stage
  application:
    name: Property accountant service
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
  main:
    banner-mode: off
things:
  jwt:
    header: Authorization
    secret-key: your-very-long-random-secret-key-32bytes!
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days
logging:
  level:
    ua.com.sinenko.things: INFO
    co.elastic.clients: DEBUG
    org:
      springframework:
        data:
          elasticsearch: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: "*"
      discovery:
        enabled: on
  endpoint:
    shutdown:
      access:
        unrestricted: true
      enabled: on
  info:
    env:
      enabled: true