spring:
  profiles:
    active: stage
  docker:
    compose:
      profiles:
        active: stage
  application:
    name: Property accountant service
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/things
    username: things_service
    password: things12345
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
#  elasticsearch:
#    uris: localhost:9200
#    username: things_service
#    password: things12345
#    client:
#      reactive:
#        ssl:
#          trust-store: classpath:elasticsearch-ca.jks
#          trust-store-password: 123456
  main:
    banner-mode: off
things:
  jwt:
    header: Authorization
    secret-key: your-very-long-random-secret-key-32bytes!
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days
logging:
  level:
    ua.com.sinenko.things: INFO
    co:
      elastic:
        clients: DEBUG
    org:
      springframework:
        data:
          elasticsearch: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
