spring:
  config:
    activate:
      on-profile: test
  liquibase:
    enabled: false
  application:
    name: Property accountant service test profile
  datasource:
    url: jdbc:h2:file:./things-test
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
    platform: org.hibernate.dialect.H2Dialect
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true

