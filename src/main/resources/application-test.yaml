spring:
  config:
    activate:
      on-profile: test
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  application:
    name: Property accountant service test profile
  datasource:
    url: jdbc:h2:file:~/things;init=create schema if not exists things
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      default_schema: things
      ddl-auto: none
  h2:
    console:
      enabled: true

