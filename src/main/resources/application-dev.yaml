spring:
  debug: true
  config:
    activate:
      on-profile: dev
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/things
    username: things_service
    password: things12345
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate.hibernate.format_sql: true


things:
  jwt:
    secret-key: secretkeyforjwttokenyforjwttoken
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days

logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE