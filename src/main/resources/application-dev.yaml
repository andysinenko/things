spring:
  config:
    activate:
      on-profile: test
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  application:
    name: Property accountant service test profile
  datasource:
    url: jdbc:h2:file:~/things;init=create schema if not exists things
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      default_schema: things
      ddl-auto: none
  h2:
    console:
      enabled: true

things:
  jwt:
    secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days