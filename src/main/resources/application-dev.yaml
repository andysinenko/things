spring:
  config:
    activate:
      on-profile: dev
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/things
    username: things_service
    password: things12345
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    open-in-view: true
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate.format_sql: true
      hibernate:
        default_batch_fetch_size: 50
things:
  jwt:
    secret-key: secretkeyforjwttokenyforjwttoken
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days

logging:
  level:
    ua.com.sinenko.things: TRACE
    root: INFO
    org:
      springframework: INFO
      hibernate:
        SQL: DEBUG
        type.descriptor.sql.BasicBinder: DEBUG

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"