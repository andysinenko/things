spring:
  liquibase:
    enabled: true
    change-log: db/changelog/db.changelog-master.xml
    drop-first: false
    default-schema: THINGS
    liquibase-schema: THINGS
  application:
    name: Property accountant service test profile
  datasource:
    url: jdbc:h2:mem:THINGS;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS THINGS;
    username: sa
    password: sa
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
    hibernate:
      dialect: org.hibernate.dialect.H2Dialect
      default_schema: THINGS
      #ddl-auto: none
  h2:
    console:
      enabled: true

things:
  jwt:
    secret-key: secretkeyforjwttokenyforjwttoken
    expiration: 86400000 # a day
    refresh-token:
      expiration: 604800000 # 7 days